version: "3"

silent: true

vars:
  KAFKA_BOOTSTRAP: '{{.KAFKA_BOOTSTRAP | default "localhost:9092"}}'
  CONNECT_URL: '{{.CONNECT_URL | default "http://localhost:8083"}}'
  PG_DSN: '{{.PG_DSN | default "postgres://postgres:postgres@localhost:5432/benchdb?sslmode=disable"}}'
  CONNECTOR_NAME: pg-jdbc-sink-bench
  CONSUMER_GROUP: connect-pg-jdbc-sink-bench

tasks:
  up:
    desc: Build and start all infrastructure (Kafka, PostgreSQL, Kafka Connect), wait until ready
    cmds:
      - docker compose up -d --build
      - until curl -sf {{.CONNECT_URL}}/ > /dev/null 2>&1; do sleep 3; done
      - echo "Kafka Connect ready at {{.CONNECT_URL}}"

  down:
    desc: Stop and remove all containers and volumes
    cmds:
      - docker compose down -v --remove-orphans

  connector:create:
    desc: Register the JDBC sink connector
    cmds:
      - |
        curl -sf -X POST {{.CONNECT_URL}}/connectors \
          -H "Content-Type: application/json" \
          -d @connector.json | jq '.name'

  connector:status:
    desc: Show connector and task status
    cmds:
      - curl -sf {{.CONNECT_URL}}/connectors/{{.CONNECTOR_NAME}}/status | jq .

  connector:delete:
    desc: Delete the JDBC sink connector (without stopping infrastructure)
    cmds:
      - curl -s -X DELETE {{.CONNECT_URL}}/connectors/{{.CONNECTOR_NAME}} || true

  connector:pause:
    desc: Pause the connector (stop consuming without deleting offsets)
    cmds:
      - curl -sf -X PUT {{.CONNECT_URL}}/connectors/{{.CONNECTOR_NAME}}/pause | jq .

  connector:resume:
    desc: Resume a paused connector
    cmds:
      - curl -sf -X PUT {{.CONNECT_URL}}/connectors/{{.CONNECTOR_NAME}}/resume | jq .

  data:load:
    desc: "Produce events to bench-events topic (e.g. task data:load COUNT=5000000)"
    vars:
      COUNT: '{{.COUNT | default "1000000"}}'
    env:
      COUNT: '{{.COUNT}}'
      KAFKA_BOOTSTRAP: '{{.KAFKA_BOOTSTRAP}}'
    cmds:
      - go run ../../../../../cmd/redpanda-connect/main.go run ./producer.yaml

  topic:reset-offsets:
    desc: Reset consumer group offsets to beginning of bench-events (reprocess all messages)
    cmds:
      - |
        docker exec pgkc-kafka kafka-consumer-groups \
          --bootstrap-server localhost:29092 \
          --group {{.CONSUMER_GROUP}} \
          --topic bench-events \
          --reset-offsets --to-earliest --execute 2>/dev/null || true

  bench:lag:
    desc: Show current consumer lag for the JDBC sink connector group
    cmds:
      - docker exec pgkc-kafka kafka-consumer-groups --bootstrap-server localhost:29092 --describe --group {{.CONSUMER_GROUP}}

  bench:offsets:
    desc: Show end offsets (total messages) for bench-events
    cmds:
      - docker exec pgkc-kafka kafka-get-offsets --bootstrap-server localhost:29092 --topic bench-events

  bench:pg-count:
    desc: Count rows written to bench_events table in PostgreSQL
    cmds:
      - psql {{.PG_DSN}} -c "SELECT COUNT(*) AS rows_written FROM bench_events;"

  # Measure throughput by polling consumer group lag until the topic is fully drained.
  #
  # Strategy: poll lag every INTERVAL seconds, print rolling msg/s (delta_lag/delta_time).
  # When lag hits zero, print overall elapsed time and average throughput.
  #
  # NOTE: The JDBC sink commits Kafka offsets after each batch flush to PostgreSQL.
  # Between commits, lag appears frozen. Keep INTERVAL >= 5s for stable readings.
  #
  # Usage:
  #   task bench:measure TOTAL=1000000
  #   task bench:measure TOTAL=5000000 INTERVAL=5
  bench:measure:
    desc: "Poll lag and print msg/s until topic is drained (e.g. task bench:measure TOTAL=1000000)"
    vars:
      TOTAL: '{{.TOTAL | default "1000000"}}'
      INTERVAL: '{{.INTERVAL | default "5"}}'
    cmds:
      - |
        GROUP={{.CONSUMER_GROUP}}
        INTERVAL={{.INTERVAL}}
        TOTAL={{.TOTAL}}

        get_lag() {
          docker exec pgkc-kafka kafka-consumer-groups \
            --bootstrap-server localhost:29092 \
            --describe --group "$GROUP" 2>/dev/null \
            | awk '/bench-events/ {
                cur = ($4 == "-") ? 0 : $4
                sum += $5 - cur
              } END {print (NR == 0 ? -1 : sum)}'
        }

        START=""
        INITIAL_LAG=""
        PREV_LAG=""
        PREV_TIME=""

        printf "%-10s  %-14s  %s\n" "TIME" "LAG" "MSG/S"

        while true; do
          sleep "$INTERVAL"
          LAG=$(get_lag)
          NOW=$(date +%s)

          if [ -z "$START" ]; then
            if [ "$LAG" -gt 0 ] 2>/dev/null; then
              START=$NOW
              INITIAL_LAG=$LAG
              PREV_LAG=$LAG
              PREV_TIME=$NOW
              printf "%-10s  %-14s  (timing started)\n" "$(date +%H:%M:%S)" "$LAG"
            else
              printf "%-10s  %-14s  (waiting for lag...)\n" "$(date +%H:%M:%S)" "$LAG"
            fi
            continue
          fi

          # -1 means kafka-consumer-groups returned no rows for the topic —
          # the connector committed all offsets and the group describe is empty.
          # Treat as 0 (fully drained) once timing has started.
          [ "$LAG" -eq -1 ] 2>/dev/null && LAG=0

          DELTA_T=$((NOW - PREV_TIME))
          DELTA_LAG=$((PREV_LAG - LAG))
          if [ "$DELTA_T" -gt 0 ]; then
            RATE=$((DELTA_LAG / DELTA_T))
          else
            RATE=0
          fi

          printf "%-10s  %-14s  %s msg/s\n" "$(date +%H:%M:%S)" "$LAG" "$RATE"

          if [ "$LAG" -eq 0 ]; then
            ELAPSED=$((NOW - START))
            AVG=$(( INITIAL_LAG / (ELAPSED > 0 ? ELAPSED : 1) ))
            echo "---"
            echo "Total messages : $INITIAL_LAG"
            echo "Elapsed        : ${ELAPSED}s"
            echo "Avg throughput : ${AVG} msg/s"
            break
          fi

          PREV_LAG=$LAG
          PREV_TIME=$NOW
        done

  # Full benchmark: load N events, reset connector, start measuring.
  #
  # Usage:
  #   task bench:run COUNT=1000000
  #   task bench:run COUNT=5000000
  bench:run:
    desc: "Full benchmark: load COUNT events then measure JDBC sink throughput (e.g. task bench:run COUNT=1000000)"
    vars:
      COUNT: '{{.COUNT | default "1000000"}}'
    cmds:
      - task connector:delete
      - sleep 2
      - psql {{.PG_DSN}} -c "TRUNCATE bench_events;"
      - |
        COUNT={{.COUNT}} KAFKA_BOOTSTRAP={{.KAFKA_BOOTSTRAP}} \
        go run ../../../../../cmd/redpanda-connect/main.go run ./producer.yaml
      - task connector:create
      - task bench:measure TOTAL={{.COUNT}}

  bench:pg-count-verify:
    desc: Compare expected row count against actual rows in bench_events
    vars:
      EXPECTED: '{{.EXPECTED | default "1000000"}}'
    cmds:
      - |
        ACTUAL=$(psql {{.PG_DSN}} -t -c "SELECT COUNT(*) FROM bench_events;" | tr -d ' ')
        echo "Expected : {{.EXPECTED}}"
        echo "Actual   : $ACTUAL"
        if [ "$ACTUAL" -eq "{{.EXPECTED}}" ]; then
          echo "OK — row count matches"
        else
          echo "MISMATCH"
        fi

  bench-topic:recreate:
    desc: Delete and recreate bench-events topic for a clean slate
    cmds:
      - docker exec pgkc-kafka kafka-topics --bootstrap-server localhost:29092 --delete --topic bench-events 2>/dev/null || true
      - |
        until ! docker exec pgkc-kafka kafka-topics --bootstrap-server localhost:29092 \
            --list 2>/dev/null | grep -q '^bench-events$'; do
          sleep 1
        done
      - |
        docker exec pgkc-kafka kafka-topics --bootstrap-server localhost:29092 \
          --create --topic bench-events \
          --partitions 16 \
          --replication-factor 1

  logs:connect:
    desc: Follow Kafka Connect worker logs
    cmds:
      - docker compose logs -f kafka-connect

  logs:postgres:
    desc: Follow PostgreSQL logs
    cmds:
      - docker compose logs -f postgres
